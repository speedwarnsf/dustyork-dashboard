<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D's Projects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #888;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 12px;
        }
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: -12px;
        }
        .login-container {
            width: 280px;
            padding: 30px;
            border: 1px solid #333;
        }
        .login-container h1 {
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 25px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .login-container input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: #ccc;
            font-size: 16px;
            margin-bottom: 15px;
            -webkit-appearance: none;
            border-radius: 0;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .error { color: #aa4444; font-size: 12px; margin-top: 10px; display: none; }
        
        .dashboard { display: none; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #222;
        }
        header h1 {
            font-size: 13px;
            font-weight: 400;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .header-actions {
            display: flex;
            gap: 6px;
        }
        .refresh-btn, .logout-btn {
            background: none;
            border: 1px solid #333;
            color: #666;
            padding: 6px 10px;
            font-size: 9px;
            cursor: pointer;
            text-transform: uppercase;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        .stat {
            background: #111;
            border: 1px solid #222;
            padding: 8px 4px;
            text-align: center;
        }
        .stat-value { font-size: 18px; color: #ccc; font-weight: 300; }
        .stat-label { font-size: 7px; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; color: #555; }
        
        .projects-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .project-card {
            background: #111;
            border: 1px solid #222;
            overflow: hidden;
            position: relative;
        }
        .project-card.llm-active { border-left: 2px solid #6aa4db; }
        .llm-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 7px;
            color: #6aa4db;
            text-transform: uppercase;
            background: rgba(0,0,0,0.85);
            padding: 2px 5px;
            z-index: 10;
        }
        
        .project-preview {
            width: 100%;
            height: 120px;
            background: #080808;
            position: relative;
            overflow: hidden;
        }
        .project-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }
        .project-preview .no-preview {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #333;
            font-size: 10px;
            text-transform: uppercase;
        }
        .project-preview .overlay-btn {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0,0,0,0.85);
            color: #aaa;
            padding: 4px 8px;
            font-size: 8px;
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid #444;
        }
        .project-preview .overlay-btn.live { background: rgba(0,80,0,0.95); color: #fff; border-color: #0a0; }
        
        .project-info { padding: 10px; }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .project-name { font-size: 13px; color: #ccc; font-weight: 500; }
        .project-status {
            font-size: 7px;
            text-transform: uppercase;
            padding: 2px 5px;
            background: #1a1a1a;
            border: 1px solid #333;
        }
        .status-hot { color: #8a8; border-color: #353; }
        .status-warm { color: #aa8; border-color: #553; }
        .status-cold { color: #a88; border-color: #533; }
        .status-frozen { color: #666; }
        
        .project-meta {
            font-size: 9px;
            color: #555;
            margin-bottom: 8px;
        }
        .project-meta a { color: #666; text-decoration: none; }
        .live-link { color: #6a6 !important; }
        
        .project-stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 9px;
            color: #666;
        }
        
        .last-commit {
            font-size: 9px;
            color: #555;
            padding: 6px 8px;
            background: #080808;
            margin-bottom: 8px;
            border-left: 2px solid #333;
        }
        
        .llm-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }
        .llm-buttons a {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            text-decoration: none;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .llm-buttons a:active { background: #333; }
        .llm-buttons a.disabled { opacity: 0.25; pointer-events: none; }
        
        .toast {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            padding: 8px 16px;
            font-size: 10px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }

        @media (min-width: 600px) {
            body { padding: 20px; }
            .projects-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .project-preview { height: 160px; }
            .project-info { padding: 15px; }
            .llm-buttons a { height: 44px; font-size: 9px; }
        }
        @media (min-width: 900px) {
            .projects-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <h1>D's Projects</h1>
            <form id="loginForm">
                <input type="password" id="password" placeholder="Password" autofocus>
                <button type="submit">Enter</button>
                <p class="error" id="error">Incorrect password</p>
            </form>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <header>
            <h1>D's Projects</h1>
            <div class="header-actions">
                <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">Refresh</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="totalProjects">6</div>
                <div class="stat-label">Projects</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="hotProjects">0</div>
                <div class="stat-label">Hot</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="coldProjects">0</div>
                <div class="stat-label">Cold</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="llmProjects">0</div>
                <div class="stat-label">LLM</div>
            </div>
        </div>

        <div class="projects-grid" id="projectsGrid"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const GITHUB_USER = 'speedwarnsf';
        const SESSION_WINDOW_DAYS = 3;
        const LLM_SIGNATURES = {
            'speedwarnsf@gmail.com': 'claude',
            'dustinyork15@gmail.com': 'chatgpt'
        };

        const projects = [
            { name: "Nudio", repo: "ebaix", url: "https://github.com/speedwarnsf/ebaix", liveUrl: "https://nudio.ai", description: "AI product photography" },
            { name: "Championship Tennis", repo: "championship-tennis", url: "https://github.com/speedwarnsf/championship-tennis", liveUrl: "https://championship-tennis.vercel.app", description: "Mobile tennis game" },
            { name: "The Forge", repo: "Cforge", url: "https://github.com/speedwarnsf/Cforge", liveUrl: null, placeholder: "thecforge.com", description: "AI creative ideation" },
            { name: "Earth Defender", repo: "earth-defender", url: "https://github.com/speedwarnsf/earth-defender", liveUrl: null, description: "Orbital defense game" },
            { name: "Wellth", repo: "wellth-app", url: "https://github.com/speedwarnsf/wellth-app", liveUrl: null, placeholder: "goodwellth.com", description: "Wellness tips app" },
            { name: "D York Music", repo: null, url: null, liveUrl: null, placeholder: "dyorkmusic.com", description: "Music portfolio" }
        ];

        projects.forEach(p => { p.lastCommit = null; p.lastMessage = null; p.lastCommitEmail = null; p.openIssues = 0; });

        function getSessions() {
            try { return JSON.parse(localStorage.getItem('llmSessions') || '{}'); } catch { return {}; }
        }
        function saveSession(repo, llm) {
            const s = getSessions();
            s[repo] = { llm, timestamp: new Date().toISOString() };
            localStorage.setItem('llmSessions', JSON.stringify(s));
        }
        function detectLLM(p) {
            if (!p.repo || !p.lastCommit) return null;
            const sessions = getSessions();
            const session = sessions[p.repo];
            const emailLLM = p.lastCommitEmail ? LLM_SIGNATURES[p.lastCommitEmail.toLowerCase()] : null;
            const commitDate = new Date(p.lastCommit);
            const daysSince = (new Date() - commitDate) / (1000*60*60*24);
            if (daysSince <= SESSION_WINDOW_DAYS && emailLLM) return emailLLM;
            if (session) {
                const diff = Math.abs(commitDate - new Date(session.timestamp)) / (1000*60*60*24);
                if (diff <= SESSION_WINDOW_DAYS) return session.llm;
            }
            return null;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
        function getDays(d) { return d ? Math.floor((new Date() - new Date(d)) / (1000*60*60*24)) : null; }
        function getStatus(days) {
            if (days === null) return { label: 'New', cls: 'status-frozen' };
            if (days <= 7) return { label: 'Hot', cls: 'status-hot' };
            if (days <= 30) return { label: 'Warm', cls: 'status-warm' };
            if (days <= 90) return { label: 'Cold', cls: 'status-cold' };
            return { label: 'Frozen', cls: 'status-frozen' };
        }
        function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : ''; }

        function resumeInLLM(name, llm) {
            const p = projects.find(x => x.name === name);
            if (!p || !p.repo) return;
            const prompt = `Continue working on ${p.name}. Repo: ${p.url}. Last commit: "${p.lastMessage || 'unknown'}" on ${fmtDate(p.lastCommit) || 'unknown'}. ${p.description}. Review the files and suggest next steps.`;
            saveSession(p.repo, llm);
            if (llm === 'chatgpt') {
                window.open('https://chat.openai.com/?hints=search&q=' + encodeURIComponent(prompt), '_blank');
            } else {
                navigator.clipboard.writeText(prompt).catch(() => {});
                const urls = { claude: 'https://claude.ai', gemini: 'https://gemini.google.com', grok: 'https://grok.x.ai' };
                window.open(urls[llm], '_blank');
                showToast('Prompt copied');
            }
        }

        function getPreviewUrl(p) {
            if (p.liveUrl) return 'https://api.microlink.io/?url=' + encodeURIComponent(p.liveUrl) + '&screenshot=true&meta=false&embed=screenshot.url';
            if (p.repo) return 'https://opengraph.githubassets.com/1/' + GITHUB_USER + '/' + p.repo;
            return null;
        }

        function render() {
            const grid = document.getElementById('projectsGrid');
            let hot = 0, cold = 0, llmCount = 0;
            const sorted = [...projects].sort((a, b) => {
                if (!a.lastCommit) return 1;
                if (!b.lastCommit) return -1;
                return new Date(b.lastCommit) - new Date(a.lastCommit);
            });

            grid.innerHTML = sorted.map(p => {
                const days = getDays(p.lastCommit);
                const status = getStatus(days);
                const llm = detectLLM(p);
                if (days !== null && days <= 7) hot++;
                if (days !== null && days > 30) cold++;
                if (llm) llmCount++;

                const previewUrl = getPreviewUrl(p);
                const linkUrl = p.liveUrl || p.url || '#';
                let previewHtml;
                if (previewUrl) {
                    const btnClass = p.liveUrl ? 'overlay-btn live' : 'overlay-btn';
                    const btnText = p.liveUrl ? '● Live' : 'Repo';
                    previewHtml = `<a href="${linkUrl}" target="_blank"><img src="${previewUrl}" alt="${p.name}" onerror="this.outerHTML='<div class=no-preview>No Preview</div>'"></a><a href="${linkUrl}" target="_blank" class="${btnClass}">${btnText}</a>`;
                } else {
                    previewHtml = '<div class="no-preview">No Repo</div>';
                }

                let meta = [];
                if (p.liveUrl) meta.push('<a href="' + p.liveUrl + '" target="_blank" class="live-link">● Live</a>');
                if (p.placeholder) meta.push('<span>' + p.placeholder + '</span>');
                if (p.url) meta.push('<a href="' + p.url + '" target="_blank">GitHub</a>');
                const metaHtml = meta.length ? meta.join(' · ') : '<span>No repo</span>';

                return `
                <div class="project-card ${llm ? 'llm-active' : ''}">
                    ${llm ? '<span class="llm-badge">' + llm + '</span>' : ''}
                    <div class="project-preview">${previewHtml}</div>
                    <div class="project-info">
                        <div class="project-header">
                            <span class="project-name">${p.name}</span>
                            <span class="project-status ${status.cls}">${status.label}</span>
                        </div>
                        <div class="project-meta">${metaHtml}</div>
                        <div class="project-stats-row">
                            <span>${days !== null ? days + 'd idle' : 'New'}</span>
                            <span>${p.openIssues} issues</span>
                        </div>
                        ${p.lastMessage ? '<div class="last-commit">' + p.lastMessage + ' · ' + fmtDate(p.lastCommit) + '</div>' : ''}
                        <div class="llm-buttons">
                            <a href="#" onclick="resumeInLLM('${p.name}','claude');return false" class="${!p.repo ? 'disabled' : ''}">Claude</a>
                            <a href="#" onclick="resumeInLLM('${p.name}','chatgpt');return false" class="${!p.repo ? 'disabled' : ''}">GPT</a>
                            <a href="#" onclick="resumeInLLM('${p.name}','gemini');return false" class="${!p.repo ? 'disabled' : ''}">Gemini</a>
                            <a href="#" onclick="resumeInLLM('${p.name}','grok');return false" class="${!p.repo ? 'disabled' : ''}">Grok</a>
                        </div>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('hotProjects').textContent = hot;
            document.getElementById('coldProjects').textContent = cold;
            document.getElementById('llmProjects').textContent = llmCount;
        }

        async function fetchGitHub() {
            document.getElementById('refreshBtn').textContent = 'Loading...';
            for (const p of projects) {
                if (!p.repo) continue;
                try {
                    const [commits, repo] = await Promise.all([
                        fetch('https://api.github.com/repos/' + GITHUB_USER + '/' + p.repo + '/commits?per_page=1').then(r => r.json()),
                        fetch('https://api.github.com/repos/' + GITHUB_USER + '/' + p.repo).then(r => r.json())
                    ]);
                    if (commits && commits[0] && commits[0].commit) {
                        p.lastCommit = commits[0].commit.author.date;
                        p.lastMessage = commits[0].commit.message.split('\n')[0];
                        p.lastCommitEmail = commits[0].commit.author.email;
                    }
                    if (repo && repo.open_issues_count !== undefined) p.openIssues = repo.open_issues_count;
                } catch (e) {}
            }
            document.getElementById('refreshBtn').textContent = 'Refresh';
            render();
        }

        async function refreshData() {
            await fetchGitHub();
            showToast('Updated');
        }

        function logout() {
            sessionStorage.removeItem('authenticated');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('password').value === 'dustyork2025') {
                sessionStorage.setItem('authenticated', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                render();
                fetchGitHub();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });

        if (sessionStorage.getItem('authenticated') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            render();
            fetchGitHub();
        }
    </script>
</body>
</html>
