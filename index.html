<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D's Projects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #888;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 40px;
        }
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: -40px;
        }
        .login-container {
            width: 300px;
            padding: 40px;
            border: 1px solid #333;
        }
        .login-container h1 {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 30px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .login-container input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: #ccc;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .login-container button:hover {
            background: #333;
            color: #ccc;
        }
        .error { color: #aa4444; font-size: 12px; margin-top: 10px; display: none; }
        
        .dashboard { display: none; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }
        h1 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .refresh-btn, .logout-btn {
            background: none;
            border: 1px solid #333;
            color: #666;
            padding: 8px 16px;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .refresh-btn:hover, .logout-btn:hover {
            border-color: #555;
            color: #999;
        }
        .last-updated {
            font-size: 11px;
            color: #555;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat {
            background: #111;
            border: 1px solid #222;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            color: #ccc;
            font-weight: 300;
        }
        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            color: #555;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        .project-card {
            background: #111;
            border: 1px solid #222;
            padding: 25px;
            transition: border-color 0.2s;
        }
        .project-card:hover {
            border-color: #333;
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .project-name {
            font-size: 16px;
            color: #ccc;
            font-weight: 500;
        }
        .project-status {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 8px;
            background: #1a1a1a;
            border: 1px solid #333;
        }
        .status-hot { color: #8a8; border-color: #353; }
        .status-warm { color: #aa8; border-color: #553; }
        .status-cold { color: #a88; border-color: #533; }
        .status-frozen { color: #888; border-color: #333; }
        
        .project-meta {
            font-size: 12px;
            color: #555;
            margin-bottom: 15px;
        }
        .project-meta a {
            color: #666;
            text-decoration: none;
        }
        .project-meta a:hover {
            color: #888;
        }
        
        .project-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
        }
        .project-stat {
            text-align: center;
        }
        .project-stat-value {
            font-size: 18px;
            color: #aaa;
        }
        .project-stat-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            margin-top: 4px;
        }
        
        .last-commit {
            font-size: 12px;
            color: #666;
            padding: 12px;
            background: #0a0a0a;
            border-left: 2px solid #333;
            margin-bottom: 15px;
        }
        .last-commit-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #444;
            margin-bottom: 5px;
        }
        
        .project-actions {
            display: flex;
            gap: 10px;
        }
        .project-actions a {
            flex: 1;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            text-decoration: none;
            text-align: center;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .project-actions a:hover {
            background: #222;
            color: #aaa;
        }
        
        @media (max-width: 768px) {
            body { padding: 20px; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <h1>D's Projects</h1>
            <form id="loginForm">
                <input type="password" id="password" placeholder="Password" autofocus>
                <button type="submit">Enter</button>
                <p class="error" id="error">Incorrect password</p>
            </form>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <header>
            <h1>D's Projects</h1>
            <div class="header-actions">
                <span class="last-updated" id="lastUpdated"></span>
                <button class="refresh-btn" onclick="refreshData()">Refresh</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="totalProjects">6</div>
                <div class="stat-label">Projects</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="hotProjects">0</div>
                <div class="stat-label">Hot (7 days)</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="coldProjects">0</div>
                <div class="stat-label">Cold (30+ days)</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalCommits">0</div>
                <div class="stat-label">Total Commits</div>
            </div>
        </div>

        <div class="projects-grid" id="projectsGrid"></div>
    </div>

    <script>
        const projects = [
            {
                name: "Earth Defender",
                repo: "earth-defender",
                url: "https://github.com/speedwarnsf/earth-defender",
                lastCommit: "2025-10-18T20:49:28Z",
                lastMessage: "Update print statement to say 'Goodbye World'",
                openIssues: 0,
                description: "Orbital defense game"
            },
            {
                name: "Wellth",
                repo: "wellth-app",
                url: "https://github.com/speedwarnsf/wellth-app",
                domain: "goodwellth.com",
                lastCommit: "2025-09-24T22:23:08Z",
                lastMessage: "Add files via upload",
                openIssues: 0,
                description: "Wealth & wellness daily tips app"
            },
            {
                name: "eBai / Nudio",
                repo: "ebaix",
                url: "https://github.com/speedwarnsf/ebaix",
                domain: "ebai.me / nudio.ai",
                lastCommit: "2026-01-11T21:44:16Z",
                lastMessage: "Relax OAuth state check for reinstalls",
                openIssues: 0,
                description: "AI product photography tool"
            },
            {
                name: "The Forge",
                repo: "Cforge",
                url: "https://github.com/speedwarnsf/Cforge",
                domain: "thecforge.com",
                lastCommit: "2025-07-17T20:49:45Z",
                lastMessage: "Add files via upload",
                openIssues: 0,
                description: "Rhetorical devices database"
            },
            {
                name: "Championship Tennis",
                repo: "championship-tennis",
                url: "https://github.com/speedwarnsf/championship-tennis",
                lastCommit: "2026-01-11T21:53:41Z",
                lastMessage: "Initial commit - Championship Tennis game",
                openIssues: 0,
                description: "Centre Court mobile game"
            },
            {
                name: "D York Music",
                repo: null,
                url: null,
                domain: "dyorkmusic.com",
                lastCommit: null,
                lastMessage: null,
                openIssues: 0,
                description: "Music portfolio site"
            }
        ];

        function getDaysSince(dateStr) {
            if (!dateStr) return null;
            const date = new Date(dateStr);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            return Math.floor(diffTime / (1000 * 60 * 60 * 24));
        }

        function getStatus(days) {
            if (days === null) return { label: 'Not Started', class: 'status-frozen' };
            if (days <= 7) return { label: 'Hot', class: 'status-hot' };
            if (days <= 30) return { label: 'Warm', class: 'status-warm' };
            if (days <= 90) return { label: 'Cold', class: 'status-cold' };
            return { label: 'Frozen', class: 'status-frozen' };
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'Never';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            let hot = 0, cold = 0;

            const sorted = [...projects].sort((a, b) => {
                if (!a.lastCommit) return 1;
                if (!b.lastCommit) return -1;
                return new Date(b.lastCommit) - new Date(a.lastCommit);
            });

            grid.innerHTML = sorted.map(project => {
                const days = getDaysSince(project.lastCommit);
                const status = getStatus(days);
                
                if (days !== null && days <= 7) hot++;
                if (days !== null && days > 30) cold++;

                return `
                    <div class="project-card">
                        <div class="project-header">
                            <span class="project-name">${project.name}</span>
                            <span class="project-status ${status.class}">${status.label}</span>
                        </div>
                        <div class="project-meta">
                            ${project.domain ? `<span>${project.domain}</span> · ` : ''}
                            ${project.url ? `<a href="${project.url}" target="_blank">GitHub</a>` : '<span>No repo yet</span>'}
                        </div>
                        <div class="project-stats">
                            <div class="project-stat">
                                <div class="project-stat-value">${days !== null ? days : '—'}</div>
                                <div class="project-stat-label">Days Idle</div>
                            </div>
                            <div class="project-stat">
                                <div class="project-stat-value">${project.openIssues}</div>
                                <div class="project-stat-label">Open Issues</div>
                            </div>
                            <div class="project-stat">
                                <div class="project-stat-value">${project.repo ? '✓' : '—'}</div>
                                <div class="project-stat-label">On GitHub</div>
                            </div>
                        </div>
                        ${project.lastMessage ? `
                            <div class="last-commit">
                                <div class="last-commit-label">Last Commit</div>
                                ${project.lastMessage}<br>
                                <span style="color:#444">${formatDate(project.lastCommit)}</span>
                            </div>
                        ` : ''}
                        <div class="project-actions">
                            ${project.url ? `<a href="${project.url}" target="_blank">View Repo</a>` : '<a href="#" style="opacity:0.3">No Repo</a>'}
                            <a href="#" onclick="resumeProject('${project.name}'); return false;">Resume in Claude</a>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('hotProjects').textContent = hot;
            document.getElementById('coldProjects').textContent = cold;
            document.getElementById('lastUpdated').textContent = 'Data from: ' + new Date().toLocaleTimeString();
        }

        function resumeProject(name) {
            const project = projects.find(p => p.name === name);
            const prompt = `I want to work on ${name}. ${project.repo ? `The repo is ${project.url}. Last commit was "${project.lastMessage}" on ${formatDate(project.lastCommit)}.` : 'This project is not on GitHub yet.'} ${project.description}. What should I focus on?`;
            
            navigator.clipboard.writeText(prompt).then(() => {
                alert('Prompt copied! Paste it into Claude to resume.');
            });
        }

        function refreshData() {
            renderProjects();
            alert('Data refreshed. For live GitHub updates, the dashboard needs a backend or GitHub API token.');
        }

        function logout() {
            sessionStorage.removeItem('authenticated');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            if (password === 'dustyork2025') {
                sessionStorage.setItem('authenticated', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                renderProjects();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });

        if (sessionStorage.getItem('authenticated') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            renderProjects();
        }
    </script>
</body>
</html>
