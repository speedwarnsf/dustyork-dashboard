<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D's Projects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #888;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 40px;
        }
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: -40px;
        }
        .login-container {
            width: 300px;
            padding: 40px;
            border: 1px solid #333;
        }
        .login-container h1 {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 30px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .login-container input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: #ccc;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .login-container button:hover {
            background: #333;
            color: #ccc;
        }
        .error { color: #aa4444; font-size: 12px; margin-top: 10px; display: none; }
        
        .dashboard { display: none; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }
        h1 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .refresh-btn, .logout-btn {
            background: none;
            border: 1px solid #333;
            color: #666;
            padding: 8px 16px;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .refresh-btn:hover, .logout-btn:hover {
            border-color: #555;
            color: #999;
        }
        .refresh-btn.loading {
            color: #555;
            pointer-events: none;
        }
        .last-updated {
            font-size: 11px;
            color: #555;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat {
            background: #111;
            border: 1px solid #222;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            color: #ccc;
            font-weight: 300;
        }
        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            color: #555;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        .project-card {
            background: #111;
            border: 1px solid #222;
            padding: 25px;
            transition: border-color 0.2s;
            position: relative;
        }
        .project-card:hover {
            border-color: #333;
        }
        .project-card.llm-active {
            border-left: 1px solid #6aa4db;
        }
        .llm-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 8px;
            color: #6aa4db;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .project-name {
            font-size: 16px;
            color: #ccc;
            font-weight: 500;
        }
        .project-status {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 8px;
            background: #1a1a1a;
            border: 1px solid #333;
        }
        .status-hot { color: #8a8; border-color: #353; }
        .status-warm { color: #aa8; border-color: #553; }
        .status-cold { color: #a88; border-color: #533; }
        .status-frozen { color: #888; border-color: #333; }
        
        .project-meta {
            font-size: 12px;
            color: #555;
            margin-bottom: 15px;
        }
        .project-meta a {
            color: #666;
            text-decoration: none;
        }
        .project-meta a:hover {
            color: #888;
        }
        .live-link {
            color: #6a6 !important;
        }
        .live-link:hover {
            color: #8c8 !important;
        }
        
        .project-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
        }
        .project-stat {
            text-align: center;
        }
        .project-stat-value {
            font-size: 18px;
            color: #aaa;
        }
        .project-stat-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            margin-top: 4px;
        }
        
        .last-commit {
            font-size: 12px;
            color: #666;
            padding: 12px;
            background: #0a0a0a;
            border-left: 2px solid #333;
            margin-bottom: 15px;
        }
        .last-commit-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #444;
            margin-bottom: 5px;
        }
        
        .project-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .project-actions a {
            flex: 1;
            min-width: 70px;
            padding: 8px 6px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            text-decoration: none;
            text-align: center;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
        }
        .project-actions a:hover {
            background: #222;
            color: #aaa;
        }
        .project-actions a.disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .project-actions a.live-btn {
            color: #6a6;
            border-color: #353;
        }
        .project-actions a.live-btn:hover {
            color: #8c8;
            background: #1a2a1a;
        }
        .project-actions a.preview-btn {
            color: #68a;
            border-color: #346;
        }

        /* Preview Panel */
        .preview-panel {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #222;
        }
        .preview-panel.open {
            display: block;
        }
        .preview-section {
            margin-bottom: 15px;
        }
        .preview-section:last-child {
            margin-bottom: 0;
        }
        .preview-section-title {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            margin-bottom: 8px;
        }
        .preview-readme {
            font-size: 12px;
            color: #777;
            line-height: 1.6;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .preview-commits {
            font-size: 11px;
        }
        .preview-commit {
            padding: 8px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .preview-commit:last-child {
            border-bottom: none;
        }
        .preview-commit-msg {
            color: #888;
        }
        .preview-commit-date {
            color: #555;
            font-size: 10px;
        }
        .preview-files {
            font-size: 11px;
            color: #666;
            font-family: monospace;
        }
        .preview-files div {
            padding: 2px 0;
        }
        .preview-loading {
            color: #555;
            font-size: 11px;
            font-style: italic;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            padding: 12px 24px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            body { padding: 20px; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <h1>D's Projects</h1>
            <form id="loginForm">
                <input type="password" id="password" placeholder="Password" autofocus>
                <button type="submit">Enter</button>
                <p class="error" id="error">Incorrect password</p>
            </form>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <header>
            <h1>D's Projects</h1>
            <div class="header-actions">
                <span class="last-updated" id="lastUpdated"></span>
                <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">Refresh</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="totalProjects">6</div>
                <div class="stat-label">Projects</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="hotProjects">0</div>
                <div class="stat-label">Hot (7 days)</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="coldProjects">0</div>
                <div class="stat-label">Cold (30+ days)</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="llmProjects">0</div>
                <div class="stat-label">LLM Active</div>
            </div>
        </div>

        <div class="projects-grid" id="projectsGrid"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const GITHUB_USER = 'speedwarnsf';
        const SESSION_WINDOW_DAYS = 3;
        
        const LLM_SIGNATURES = {
            'speedwarnsf@gmail.com': 'claude',
            'DUSTINYORK15@GMAIL.COM': 'chatgpt',
            'dustinyork15@gmail.com': 'chatgpt'
        };

        const projects = [
            {
                name: "Nudio",
                repo: "ebaix",
                url: "https://github.com/speedwarnsf/ebaix",
                liveUrl: "https://nudio.ai",
                shopifyUrl: "https://admin.shopify.com/store/nudio-dev/apps/nudio-product-studio",
                lastCommit: null,
                lastMessage: null,
                lastCommitEmail: null,
                recentCommits: [],
                readme: null,
                files: [],
                openIssues: 0,
                description: "AI product photography - transforms iPhone photos into studio shots"
            },
            {
                name: "The Forge",
                repo: "Cforge",
                url: "https://github.com/speedwarnsf/Cforge",
                liveUrl: null,
                domain: "thecforge.com (placeholder)",
                lastCommit: null,
                lastMessage: null,
                lastCommitEmail: null,
                recentCommits: [],
                readme: null,
                files: [],
                openIssues: 0,
                description: "AI-powered creative ideation - rhetorical devices database"
            },
            {
                name: "Earth Defender",
                repo: "earth-defender",
                url: "https://github.com/speedwarnsf/earth-defender",
                liveUrl: null,
                lastCommit: null,
                lastMessage: null,
                lastCommitEmail: null,
                recentCommits: [],
                readme: null,
                files: [],
                openIssues: 0,
                description: "Orbital defense game"
            },
            {
                name: "Wellth",
                repo: "wellth-app",
                url: "https://github.com/speedwarnsf/wellth-app",
                liveUrl: null,
                domain: "goodwellth.com (placeholder)",
                lastCommit: null,
                lastMessage: null,
                lastCommitEmail: null,
                recentCommits: [],
                readme: null,
                files: [],
                openIssues: 0,
                description: "Wealth & wellness daily tips app"
            },
            {
                name: "Championship Tennis",
                repo: "championship-tennis",
                url: "https://github.com/speedwarnsf/championship-tennis",
                liveUrl: null,
                lastCommit: null,
                lastMessage: null,
                lastCommitEmail: null,
                recentCommits: [],
                readme: null,
                files: [],
                openIssues: 0,
                description: "Centre Court mobile game"
            },
            {
                name: "D York Music",
                repo: null,
                url: null,
                liveUrl: null,
                domain: "dyorkmusic.com (needs website)",
                lastCommit: null,
                lastMessage: null,
                lastCommitEmail: null,
                recentCommits: [],
                readme: null,
                files: [],
                openIssues: 0,
                description: "Music portfolio site"
            }
        ];

        // Track open previews
        const openPreviews = new Set();

        function getSessions() {
            const stored = localStorage.getItem('llmSessions');
            return stored ? JSON.parse(stored) : {};
        }

        function saveSession(repo, llm) {
            const sessions = getSessions();
            sessions[repo] = { llm: llm, timestamp: new Date().toISOString() };
            localStorage.setItem('llmSessions', JSON.stringify(sessions));
        }

        function updateSessionTimestamp(repo) {
            const sessions = getSessions();
            if (sessions[repo]) {
                sessions[repo].timestamp = new Date().toISOString();
                localStorage.setItem('llmSessions', JSON.stringify(sessions));
            }
        }

        function isWithinWindow(dateStr, windowDays) {
            if (!dateStr) return false;
            const diffDays = (new Date() - new Date(dateStr)) / (1000 * 60 * 60 * 24);
            return diffDays <= windowDays;
        }

        function detectLLM(project) {
            const sessions = getSessions();
            const session = sessions[project.repo];
            const emailLLM = project.lastCommitEmail ? 
                LLM_SIGNATURES[project.lastCommitEmail] || LLM_SIGNATURES[project.lastCommitEmail.toLowerCase()] : null;
            
            if (session && project.lastCommit) {
                const commitDate = new Date(project.lastCommit);
                const sessionDate = new Date(session.timestamp);
                const daysDiff = Math.abs(commitDate - sessionDate) / (1000 * 60 * 60 * 24);
                
                if (daysDiff <= SESSION_WINDOW_DAYS) {
                    if (commitDate > sessionDate) updateSessionTimestamp(project.repo);
                    return { llm: emailLLM || session.llm, confidence: emailLLM ? 'high' : 'medium' };
                }
            }
            
            if (emailLLM && isWithinWindow(project.lastCommit, SESSION_WINDOW_DAYS)) {
                return { llm: emailLLM, confidence: 'medium' };
            }
            return null;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function getDaysSince(dateStr) {
            if (!dateStr) return null;
            return Math.floor((new Date() - new Date(dateStr)) / (1000 * 60 * 60 * 24));
        }

        function getStatus(days) {
            if (days === null) return { label: 'Not Started', class: 'status-frozen' };
            if (days <= 7) return { label: 'Hot', class: 'status-hot' };
            if (days <= 30) return { label: 'Warm', class: 'status-warm' };
            if (days <= 90) return { label: 'Cold', class: 'status-cold' };
            return { label: 'Frozen', class: 'status-frozen' };
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'Never';
            return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function buildPrompt(project) {
            return `I want to continue working on ${project.name}. The repo is ${project.url}. Last commit was "${project.lastMessage}" on ${formatDate(project.lastCommit)}. ${project.description}. Please review the repo files and be ready to discuss what I should focus on next.`;
        }

        function resumeInLLM(projectName, llm) {
            const project = projects.find(p => p.name === projectName);
            if (!project || !project.repo) return;
            
            const prompt = buildPrompt(project);
            saveSession(project.repo, llm);
            
            if (llm === 'chatgpt') {
                window.open(`https://chat.openai.com/?hints=search&q=${encodeURIComponent(prompt)}`, '_blank');
                showToast('Opening ChatGPT with prompt');
            } else {
                navigator.clipboard.writeText(prompt).then(() => {
                    const urls = { 'claude': 'https://claude.ai', 'gemini': 'https://gemini.google.com', 'grok': 'https://grok.x.ai' };
                    window.open(urls[llm], '_blank');
                    showToast('Prompt copied - paste in ' + llm.charAt(0).toUpperCase() + llm.slice(1));
                });
            }
        }

        function togglePreview(projectName) {
            const previewId = projectName.replace(/[^a-zA-Z0-9]/g, '');
            const panel = document.getElementById(`preview-${previewId}`);
            const btn = document.getElementById(`preview-btn-${previewId}`);
            if (panel) {
                const isOpen = panel.classList.toggle('open');
                if (isOpen) {
                    openPreviews.add(projectName);
                    if (btn) btn.textContent = '▲ Hide';
                } else {
                    openPreviews.delete(projectName);
                    if (btn) btn.textContent = '▼ Preview';
                }
            }
        }

        async function fetchGitHubData() {
            const btn = document.getElementById('refreshBtn');
            btn.textContent = 'Loading...';
            btn.classList.add('loading');

            let updated = 0;
            
            for (const project of projects) {
                if (!project.repo) continue;
                
                try {
                    // Fetch recent commits
                    const commitsRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${project.repo}/commits?per_page=5`);
                    if (commitsRes.ok) {
                        const commits = await commitsRes.json();
                        if (commits.length > 0) {
                            project.lastCommit = commits[0].commit.author.date;
                            project.lastMessage = commits[0].commit.message.split('\n')[0];
                            project.lastCommitEmail = commits[0].commit.author.email;
                            project.recentCommits = commits.map(c => ({
                                message: c.commit.message.split('\n')[0],
                                date: c.commit.author.date
                            }));
                            updated++;
                        }
                    }

                    // Fetch repo info
                    const repoRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${project.repo}`);
                    if (repoRes.ok) {
                        const repo = await repoRes.json();
                        project.openIssues = repo.open_issues_count || 0;
                    }

                    // Fetch README
                    try {
                        const readmeRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${project.repo}/readme`);
                        if (readmeRes.ok) {
                            const readme = await readmeRes.json();
                            project.readme = atob(readme.content);
                        }
                    } catch (e) {
                        console.log(`No README for ${project.repo}`);
                    }

                    // Fetch root files
                    const contentsRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${project.repo}/contents`);
                    if (contentsRes.ok) {
                        const contents = await contentsRes.json();
                        project.files = contents.slice(0, 12).map(f => ({ name: f.name, type: f.type }));
                    }
                } catch (e) {
                    console.error(`Failed to fetch ${project.repo}:`, e);
                }
            }

            btn.textContent = 'Refresh';
            btn.classList.remove('loading');
            
            return updated;
        }

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            let hot = 0, cold = 0, llmActive = 0;

            const sorted = [...projects].sort((a, b) => {
                if (!a.lastCommit) return 1;
                if (!b.lastCommit) return -1;
                return new Date(b.lastCommit) - new Date(a.lastCommit);
            });

            grid.innerHTML = sorted.map(project => {
                const days = getDaysSince(project.lastCommit);
                const status = getStatus(days);
                const llmDetection = project.repo ? detectLLM(project) : null;
                const previewId = project.name.replace(/[^a-zA-Z0-9]/g, '');
                const isPreviewOpen = openPreviews.has(project.name);
                
                if (days !== null && days <= 7) hot++;
                if (days !== null && days > 30) cold++;
                if (llmDetection) llmActive++;

                const llmClass = llmDetection ? 'llm-active' : '';
                const llmBadge = llmDetection ? `<span class="llm-badge">${llmDetection.llm}</span>` : '';

                // Meta line
                let metaHtml = '';
                if (project.liveUrl) metaHtml += `<a href="${project.liveUrl}" target="_blank" class="live-link">● Live</a>`;
                if (project.shopifyUrl) metaHtml += `${metaHtml ? ' · ' : ''}<a href="${project.shopifyUrl}" target="_blank" class="live-link">Shopify</a>`;
                if (project.domain) metaHtml += `${metaHtml ? ' · ' : ''}<span>${project.domain}</span>`;
                if (project.url) metaHtml += `${metaHtml ? ' · ' : ''}<a href="${project.url}" target="_blank">GitHub</a>`;
                if (!metaHtml) metaHtml = '<span>No repo yet</span>';

                // Preview content
                let previewContent = '';
                const hasContent = project.readme || project.recentCommits.length > 0 || project.files.length > 0;
                
                if (project.repo) {
                    if (hasContent) {
                        previewContent = `
                            ${project.readme ? `
                                <div class="preview-section">
                                    <div class="preview-section-title">README</div>
                                    <div class="preview-readme">${project.readme.replace(/[#*`]/g, ' ').substring(0, 400)}...</div>
                                </div>
                            ` : ''}
                            ${project.recentCommits.length > 0 ? `
                                <div class="preview-section">
                                    <div class="preview-section-title">Recent Commits</div>
                                    <div class="preview-commits">
                                        ${project.recentCommits.slice(0, 3).map(c => `
                                            <div class="preview-commit">
                                                <div class="preview-commit-msg">${c.message}</div>
                                                <div class="preview-commit-date">${formatDate(c.date)}</div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}
                            ${project.files.length > 0 ? `
                                <div class="preview-section">
                                    <div class="preview-section-title">Files</div>
                                    <div class="preview-files">
                                        ${project.files.map(f => `<div>${f.type === 'dir' ? '📁' : '📄'} ${f.name}</div>`).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        `;
                    } else {
                        previewContent = '<div class="preview-loading">Loading preview data... Click Refresh if empty.</div>';
                    }
                }

                return `
                    <div class="project-card ${llmClass}">
                        ${llmBadge}
                        <div class="project-header">
                            <span class="project-name">${project.name}</span>
                            <span class="project-status ${status.class}">${status.label}</span>
                        </div>
                        <div class="project-meta">${metaHtml}</div>
                        <div class="project-stats">
                            <div class="project-stat">
                                <div class="project-stat-value">${days !== null ? days : '—'}</div>
                                <div class="project-stat-label">Days Idle</div>
                            </div>
                            <div class="project-stat">
                                <div class="project-stat-value">${project.openIssues}</div>
                                <div class="project-stat-label">Open Issues</div>
                            </div>
                            <div class="project-stat">
                                <div class="project-stat-value">${project.liveUrl ? '●' : '○'}</div>
                                <div class="project-stat-label">Live</div>
                            </div>
                        </div>
                        ${project.lastMessage ? `
                            <div class="last-commit">
                                <div class="last-commit-label">Last Commit</div>
                                ${project.lastMessage}<br>
                                <span style="color:#444">${formatDate(project.lastCommit)}</span>
                            </div>
                        ` : ''}
                        <div class="project-actions">
                            ${project.liveUrl ? `<a href="${project.liveUrl}" target="_blank" class="live-btn">Live</a>` : ''}
                            ${project.repo ? `<a href="#" onclick="togglePreview('${project.name}'); return false;" class="preview-btn" id="preview-btn-${previewId}">${isPreviewOpen ? '▲ Hide' : '▼ Preview'}</a>` : ''}
                            ${project.url ? `<a href="${project.url}" target="_blank">GitHub</a>` : ''}
                            <a href="#" onclick="resumeInLLM('${project.name}', 'claude'); return false;" class="${!project.repo ? 'disabled' : ''}">Claude</a>
                            <a href="#" onclick="resumeInLLM('${project.name}', 'chatgpt'); return false;" class="${!project.repo ? 'disabled' : ''}">GPT</a>
                            <a href="#" onclick="resumeInLLM('${project.name}', 'gemini'); return false;" class="${!project.repo ? 'disabled' : ''}">Gemini</a>
                            <a href="#" onclick="resumeInLLM('${project.name}', 'grok'); return false;" class="${!project.repo ? 'disabled' : ''}">Grok</a>
                        </div>
                        ${project.repo ? `<div class="preview-panel ${isPreviewOpen ? 'open' : ''}" id="preview-${previewId}">${previewContent}</div>` : ''}
                    </div>
                `;
            }).join('');

            document.getElementById('hotProjects').textContent = hot;
            document.getElementById('coldProjects').textContent = cold;
            document.getElementById('llmProjects').textContent = llmActive;
            document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
        }

        async function refreshData() {
            const updated = await fetchGitHubData();
            renderProjects();
            showToast(`Updated ${updated} projects from GitHub`);
        }

        function logout() {
            sessionStorage.removeItem('authenticated');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('password').value === 'dustyork2025') {
                sessionStorage.setItem('authenticated', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                refreshData();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });

        if (sessionStorage.getItem('authenticated') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            refreshData();
        }
    </script>
</body>
</html>
